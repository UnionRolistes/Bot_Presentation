################################################################
# Formulaire de présentation (presentation.unionrolistes.fr).
# Déployé comme stack Komodo séparée de celle du bot lui-même (web_presentation
# vs base_base) — même repo, conteneurs indépendants.
################################################################
services:
  web-presentation:
    build:
      context: web
      dockerfile: Dockerfile
    container_name: web-presentation
    restart: unless-stopped
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-presentation.rule=Host(`presentation.unionrolistes.fr`)"
      - "traefik.http.routers.web-presentation.entrypoints=websecure"
      - "traefik.http.routers.web-presentation.tls.certresolver=le"
      - "traefik.http.services.web-presentation.loadbalancer.server.port=80"
    environment:
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}

networks:
  traefik-public:
    external: true
